name: Deploy

# Build with Vite and deploy the static site to the VPS
# (nginx static root /var/www/kart-toons, served at kart-toons.pleymor.com).
on:
  push:
    branches: [main]
  workflow_dispatch: {}

concurrency:
  group: deploy-production
  cancel-in-progress: true

env:
  DEPLOY_HOST: pleymor.com
  DEPLOY_USER: pleymor
  DEPLOY_DEST: /var/www/kart-toons
  DEPLOY_STAGE: /tmp/kart-toons-dist

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Configure SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H "${DEPLOY_HOST}" >> ~/.ssh/known_hosts 2>/dev/null

      - name: Upload build to staging
        run: |
          rsync -avz --delete \
            -e "ssh -i ~/.ssh/deploy_key" \
            dist/ "${DEPLOY_USER}@${DEPLOY_HOST}:${DEPLOY_STAGE}/"

      - name: Install into web root
        run: |
          ssh -i ~/.ssh/deploy_key "${DEPLOY_USER}@${DEPLOY_HOST}" \
            "sudo rsync -a --delete '${DEPLOY_STAGE}/' '${DEPLOY_DEST}/'"

      - name: Cleanup SSH key
        if: always()
        run: rm -f ~/.ssh/deploy_key
